<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMA Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(to bottom right, #0f172a, #1e293b); color: #fff; min-height: 100vh; padding: 24px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 32px; }
    .header h1 { font-size: 36px; font-weight: bold; margin-bottom: 8px; }
    .header p { color: #94a3b8; }
    .error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgb(220, 38, 38); color: #fca5a5; padding: 16px; border-radius: 8px; margin-bottom: 24px; display: flex; gap: 12px; }
    .error.success { background: rgba(34, 197, 94, 0.1); border-color: rgb(22, 163, 74); color: #86efac; }
    .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
    @media (max-width: 1024px) { .grid { grid-template-columns: 1fr; } }
    .panel { background: #1e293b; border-radius: 8px; padding: 24px; border-left: 4px solid; }
    .panel.blue { border-left-color: #3b82f6; }
    .panel.green { border-left-color: #22c55e; }
    .panel h2 { font-size: 20px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .input-group.full { grid-column: 1 / -1; }
    .input { width: 100%; padding: 8px 12px; background: #334155; border: 1px solid #475569; color: #fff; border-radius: 6px; font-size: 14px; }
    .input::placeholder { color: #64748b; }
    .input:focus { outline: none; border-color: #3b82f6; }
    select.input { cursor: pointer; }
    textarea.input { resize: vertical; min-height: 80px; }
    .button { padding: 12px 16px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .button:hover { background: #2563eb; }
    .button:disabled { background: #64748b; cursor: not-allowed; }
    .button.green { background: #22c55e; }
    .button.green:hover { background: #16a34a; }
    .button-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .comp-list { max-height: 400px; overflow-y: auto; margin-bottom: 16px; }
    .comp-item { background: #334155; padding: 12px; border-radius: 6px; margin-bottom: 8px; }
    .comp-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .comp-item-header button { background: #ef4444; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .analysis-result { white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
    .logo { font-size: 24px; margin-right: 8px; }
    .loading { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .sticky { position: sticky; top: 24px; }
    .empty-state { text-align: center; padding: 48px 24px; color: #94a3b8; }
    .empty-state svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function CMAAnalyzer() {
      const [subject, setSubject] = useState({
        address: '', city: '', state: '', zip: '', beds: '', baths: '', sqft: '', yearBuilt: '', lotSize: '', condition: 'Average', notes: ''
      });
      const [comparables, setComparables] = useState([]);
      const [analysis, setAnalysis] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [showValueEstimate, setShowValueEstimate] = useState(true);

      const handleSubjectChange = (e) => {
        const { name, value } = e.target;
        setSubject(prev => ({ ...prev, [name]: value }));
      };

      const addComparable = () => {
        setComparables(prev => [...prev, { id: Date.now(), address: '', city: '', state: '', beds: '', baths: '', sqft: '', yearBuilt: '', salePrice: '', saleDate: '', daysOnMarket: '', notes: '' }]);
      };

      const updateComparable = (id, field, value) => {
        setComparables(prev => prev.map(c => c.id === id ? { ...c, [field]: value } : c));
      };

      const deleteComparable = (id) => {
        setComparables(prev => prev.filter(c => c.id !== id));
      };

      const generateAnalysis = async () => {
        if (!subject.address) { setError('Enter subject property address'); return; }
        if (comparables.length < 2) { setError('Add at least 2 comparable properties'); return; }

        setLoading(true);
        setError('');

        try {
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-6',
              max_tokens: 2500,
              messages: [{
                role: 'user',
                content: `You are a professional real estate appraiser. Generate a professional Comparative Market Analysis.

SUBJECT PROPERTY:
Address: ${subject.address}, ${subject.city}, ${subject.state} ${subject.zip}
Beds: ${subject.beds} | Baths: ${subject.baths}
Sqft: ${subject.sqft} | Year Built: ${subject.yearBuilt}
Condition: ${subject.condition}
Notes: ${subject.notes}

COMPARABLE PROPERTIES:
${comparables.map((c, i) => `Comp #${i + 1}: ${c.address}, ${c.city}, ${c.state} | Beds/Baths: ${c.beds}/${c.baths} | Sqft: ${c.sqft} | Year: ${c.yearBuilt} | Sale Price: $${c.salePrice} | Sale Date: ${c.saleDate}`).join('\n')}

Generate a professional CMA with: Market Analysis, Subject Summary, Comparable Analysis, Value Conclusion (estimated market value range), and Recommendations.

Return ONLY valid JSON:
{"marketAnalysis": "paragraph", "subjectSummary": "paragraph", "comparableAnalysis": "paragraph", "valueConclusion": "paragraph", "recommendations": "paragraph"}`
              }]
            })
          });

          const data = await response.json();
          const textContent = data.content.find(c => c.type === 'text')?.text || '{}';
          const cleanJson = textContent.replace(/```json|```/g, '').trim();
          const result = JSON.parse(cleanJson);
          setAnalysis(result);
          setError('');
        } catch (err) {
          setError(`Analysis failed: ${err.message}`);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="container">
          <div className="header">
            <h1><span className="logo">📊</span>CMA Analyzer</h1>
            <p>AI-powered comparative market analysis with Claude</p>
          </div>

          {error && <div className={`error ${error.includes('successfully') ? 'success' : ''}`}>
            <span>⚠️</span> {error.replace('✓ ', '').replace('✗ ', '')}
          </div>}

          <div className="grid">
            <div>
              <div className="panel blue">
                <h2>📍 Subject Property</h2>
                <div className="input-group full">
                  <input type="text" name="address" placeholder="Street Address" value={subject.address} onChange={handleSubjectChange} className="input" />
                  <input type="text" name="city" placeholder="City" value={subject.city} onChange={handleSubjectChange} className="input" />
                </div>
                <div className="input-group">
                  <input type="text" name="state" placeholder="State" value={subject.state} onChange={handleSubjectChange} className="input" />
                  <input type="text" name="zip" placeholder="Zip" value={subject.zip} onChange={handleSubjectChange} className="input" />
                </div>
                <div className="input-group">
                  <input type="text" name="beds" placeholder="Bedrooms" value={subject.beds} onChange={handleSubjectChange} className="input" />
                  <input type="text" name="baths" placeholder="Bathrooms" value={subject.baths} onChange={handleSubjectChange} className="input" />
                </div>
                <div className="input-group">
                  <input type="text" name="sqft" placeholder="Square Feet" value={subject.sqft} onChange={handleSubjectChange} className="input" />
                  <input type="text" name="yearBuilt" placeholder="Year Built" value={subject.yearBuilt} onChange={handleSubjectChange} className="input" />
                </div>
                <div className="input-group full">
                  <select name="condition" value={subject.condition} onChange={handleSubjectChange} className="input">
                    <option>Excellent</option>
                    <option>Good</option>
                    <option>Average</option>
                    <option>Fair</option>
                    <option>Poor</option>
                  </select>
                  <input type="text" name="lotSize" placeholder="Lot Size" value={subject.lotSize} onChange={handleSubjectChange} className="input" />
                </div>
                <textarea name="notes" placeholder="Additional notes..." value={subject.notes} onChange={handleSubjectChange} className="input full"></textarea>
              </div>

              <div className="panel green" style={{ marginTop: '24px' }}>
                <h2>🏘️ Comparable Properties ({comparables.length})</h2>
                <button onClick={addComparable} className="button green">+ Add Comparable</button>
                
                <div className="comp-list">
                  {comparables.map((comp) => (
                    <div key={comp.id} className="comp-item">
                      <div className="comp-item-header">
                        <span>{comp.address || 'Comparable'}</span>
                        <button onClick={() => deleteComparable(comp.id)}>Delete</button>
                      </div>
                      <div className="input-group full">
                        <input type="text" placeholder="Address" value={comp.address} onChange={(e) => updateComparable(comp.id, 'address', e.target.value)} className="input" />
                        <input type="text" placeholder="City" value={comp.city} onChange={(e) => updateComparable(comp.id, 'city', e.target.value)} className="input" />
                      </div>
                      <div className="input-group">
                        <input type="text" placeholder="Beds" value={comp.beds} onChange={(e) => updateComparable(comp.id, 'beds', e.target.value)} className="input" />
                        <input type="text" placeholder="Baths" value={comp.baths} onChange={(e) => updateComparable(comp.id, 'baths', e.target.value)} className="input" />
                      </div>
                      <div className="input-group">
                        <input type="text" placeholder="Sqft" value={comp.sqft} onChange={(e) => updateComparable(comp.id, 'sqft', e.target.value)} className="input" />
                        <input type="text" placeholder="Year" value={comp.yearBuilt} onChange={(e) => updateComparable(comp.id, 'yearBuilt', e.target.value)} className="input" />
                      </div>
                      <div className="input-group">
                        <input type="text" placeholder="Sale Price" value={comp.salePrice} onChange={(e) => updateComparable(comp.id, 'salePrice', e.target.value)} className="input" />
                        <input type="text" placeholder="Sale Date" value={comp.saleDate} onChange={(e) => updateComparable(comp.id, 'saleDate', e.target.value)} className="input" />
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <button onClick={generateAnalysis} disabled={loading} className="button" style={{ width: '100%', marginTop: '24px', padding: '16px', fontSize: '16px' }}>
                {loading ? <span className="loading">⏳</span> : '🔍'} {loading ? 'Generating...' : 'Generate CMA Analysis'}
              </button>
            </div>

            <div className="sticky">
              {analysis ? (
                <div className="panel blue">
                  <h2>📋 Analysis Report</h2>
                  <p style={{ fontSize: '12px', color: '#94a3b8', marginBottom: '16px' }}>{new Date().toLocaleDateString()}</p>
                  
                  <div style={{ marginBottom: '16px' }}>
                    <h3 style={{ fontSize: '14px', fontWeight: 600, marginBottom: '8px' }}>Market Conditions</h3>
                    <p style={{ fontSize: '13px', lineHeight: '1.6', color: '#cbd5e1' }}>{analysis.marketAnalysis}</p>
                  </div>

                  <div style={{ marginBottom: '16px' }}>
                    <h3 style={{ fontSize: '14px', fontWeight: 600, marginBottom: '8px' }}>Subject Summary</h3>
                    <p style={{ fontSize: '13px', lineHeight: '1.6', color: '#cbd5e1' }}>{analysis.subjectSummary}</p>
                  </div>

                  <div style={{ marginBottom: '16px' }}>
                    <h3 style={{ fontSize: '14px', fontWeight: 600, marginBottom: '8px' }}>Comparable Analysis</h3>
                    <p style={{ fontSize: '13px', lineHeight: '1.6', color: '#cbd5e1' }}>{analysis.comparableAnalysis}</p>
                  </div>

                  {showValueEstimate && (
                    <div style={{ background: 'rgba(34, 197, 94, 0.1)', padding: '12px', borderRadius: '6px', marginBottom: '16px', border: '1px solid rgb(22, 163, 74)' }}>
                      <h3 style={{ fontSize: '14px', fontWeight: 600, marginBottom: '8px', color: '#86efac' }}>💰 Estimated Market Value</h3>
                      <p style={{ fontSize: '13px', lineHeight: '1.6', color: '#cbd5e1', marginBottom: '12px' }}>{analysis.valueConclusion}</p>
                      <p style={{ fontSize: '11px', color: '#64748b', lineHeight: '1.4' }}><strong>Disclaimer:</strong> AI-generated for informational purposes only. Not a professional appraisal.</p>
                    </div>
                  )}

                  <div style={{ marginBottom: '16px' }}>
                    <h3 style={{ fontSize: '14px', fontWeight: 600, marginBottom: '8px' }}>Recommendations</h3>
                    <p style={{ fontSize: '13px', lineHeight: '1.6', color: '#cbd5e1' }}>{analysis.recommendations}</p>
                  </div>

                  <div style={{ display: 'flex', gap: '8px' }}>
                    <button onClick={() => setShowValueEstimate(!showValueEstimate)} className="button" style={{ flex: 1, fontSize: '12px' }}>
                      {showValueEstimate ? '✓' : '✗'} Value
                    </button>
                    <button onClick={() => window.print()} className="button" style={{ flex: 1, fontSize: '12px' }}>📄 Print</button>
                  </div>
                </div>
              ) : (
                <div className="panel blue empty-state">
                  <div style={{ fontSize: '32px', marginBottom: '12px' }}>📊</div>
                  <p>Add property details and comparables, then click "Generate CMA Analysis" to see results here.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CMAAnalyzer />);
  </script>
</body>
</html>
